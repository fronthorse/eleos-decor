<svg xmlns="http://www.w3.org/2000/svg" width="640" height="160" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">Eleos Decor navbar logo</title>
  <desc id="desc">A clean Eleos Decor navigation logo with a contained warm gold icon and wordmark.</desc>
  <defs>
    <style>
      .gold { fill: #B8955F; }
      .ink { fill: #241F1B; }
      .ring { fill: none; stroke: #B8955F; stroke-width: 5; }
      .wordmark { font-family: Georgia, 'Times New Roman', serif; font-size: 54px; letter-spacing: 1px; }
    </style>
  </defs>
  <circle class="ring" cx="80" cy="80" r="60"/>
  <g class="gold" transform="translate(36 39) scale(.16)">
    <polygon points="162,0 432,0 488,96 104,96"/>
    <polygon points="104,104 162,204 384,204 440,300 104,300 46,202"/>
    <polygon points="104,316 162,416 444,416 500,512 104,512 46,414"/>
  </g>
  <text class="wordmark ink" x="174" y="96">Eleos</text>
  <text class="wordmark gold" x="334" y="96">Decor</text>
</svg>
